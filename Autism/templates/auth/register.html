{% extends 'base.html' %}
{% block body %}
<section class="auth-modern">
  <div class="container">
    <div class="auth-box">
      <h1>Create Account</h1>
      <p class="auth-sub">Join Auto-Ism to get started</p>

      <form class="auth-form-modern" method="POST">
        <div class="form-group-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" name="firstName" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="lastName" class="form-control" required>
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>

        <div class="form-group-row">
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Sex</label>
            <select name="sex" class="form-control" required>
              <option value="" selected disabled>Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-group-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm" class="form-control" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary full-width">Create Account</button>
      </form>

      <p style="margin-top:2rem; color:#64748B;">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" style="color:var(--primary); font-weight:600;">Login</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
