{% extends 'base.html' %}
{% block body %}
<section class="auth-modern">
  <div class="container">
    <div class="auth-box">
      <h1>Welcome Back</h1>
      <p class="auth-sub">Login to your Auto-Ism account</p>

      <form class="auth-form-modern" method="POST">
        <div class="form-group-row">
          <div class="form-group" style="width:100%;">
            <label>Email</label>
            <input type="email" name="email" placeholder="your.email@example.com" class="form-control" required>
          </div>
        </div>

        <div class="form-group-row">
          <div class="form-group" style="width:100%;">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" class="form-control" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary full-width">Login</button>
      </form>

      <p style="margin-top:2rem; color:#64748B;">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" style="color:var(--primary); font-weight:600;">Register</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
